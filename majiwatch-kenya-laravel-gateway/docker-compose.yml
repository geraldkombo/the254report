services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: maji_sentinel
      POSTGRES_USER: maji
      POSTGRES_PASSWORD: maji
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-postgis.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./server
    env_file:
      - ./.env
    environment:
      APP_AUTO_MIGRATE: "1"
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - data:/data

  worker:
    build:
      context: ./server
    env_file:
      - ./.env
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      - db
      - redis
    volumes:
      - data:/data

  beat:
    build:
      context: ./server
    env_file:
      - ./.env
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./web
    depends_on:
      - api
      - gateway
    ports:
      - "3000:80"
    volumes:
      - ./gateway:/var/www/html:ro

  gateway:
    build:
      context: ./gateway
    env_file:
      - ./.env
    environment:
      GATEWAY_STATE_DIR: /state
    depends_on:
      - db
      - redis
    volumes:
      - gateway_state:/state

volumes:
  db_data:
  data:
  gateway_state:
